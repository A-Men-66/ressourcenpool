name: Deploy to Hetzner

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy RessourcenPool via Webhook
        run: |
          curl -s -X POST https://ressourcenpool.andreas-artmann.de/webhook/deploy             -H "x-deploy-secret: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}"             -f && echo "ressourcenpool deployed"
